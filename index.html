<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>🛒 Tienda Gamer</h1>
            <p>de todos para Gamers y tecnologia</p>
        </div>

        <div class="busqueda">

            <input type="search" id="buscar" placeholder="Buscar un producto...">

        </div>
    </header>

    <nav class="categorias">

        <button class="activo" data-categoria="todos">todos</button>

        <button data-categoria="Computadoras">Computadoras</button>

        <button data-categoria="Celulares">Celulares</button>

        <button data-categoria="Gaming">Gaming</button>     
        
        <button data-categoria="Tecnologia">Tecnologia</button>

    </nav>

    <main>

        <section id="productos">

        </section>

        <aside id="detalle">
            <h2>Informacion del producto</h2>

            <div id="detalleContenido">
                <img src="" alt="">
                    
                <h3>Seleccione un producto</h3>        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                <p>Aqui aparecerá la informacion del producto seleccionado</p>
            </div>
        </aside>
    </main>

    <footer>
        <p>Tienda Gamer - projecto de JavaScript</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
